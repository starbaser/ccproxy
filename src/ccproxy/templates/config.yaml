# See https://docs.litellm.ai/docs/proxy/configs
model_list:
  # Default model
  - model_name: default
    litellm_params:
      model: claude-sonnet-4-6

  # Anthropic provided claude models, no `api_key` needed
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_base: https://api.anthropic.com

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_base: https://api.anthropic.com

  - model_name: claude-sonnet-4-5-20250929
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_base: https://api.anthropic.com

  - model_name: claude-opus-4-5-20251101
    litellm_params:
      model: anthropic/claude-opus-4-5-20251101
      api_base: https://api.anthropic.com

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_base: https://api.anthropic.com

  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_base: https://api.anthropic.com

  # ZAI (z.ai) models — requires oat_sources zai config with auth_header: x-api-key
  # - model_name: glm-5
  #   litellm_params:
  #     model: anthropic/glm-5
  #     api_base: https://api.z.ai/api/anthropic
  #
  # - model_name: glm-5-turbo
  #   litellm_params:
  #     model: anthropic/glm-5-turbo
  #     api_base: https://api.z.ai/api/anthropic
  #
  # - model_name: glm-4.7
  #   litellm_params:
  #     model: anthropic/glm-4.7
  #     api_base: https://api.z.ai/api/anthropic

  # Gemini pro models — requires GEMINI_API_KEY or GOOGLE_API_KEY
  - model_name: gemini-3.1-pro-preview
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
  - model_name: gemini-3-pro-preview
    litellm_params:
      model: gemini/gemini-3-pro-preview
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro

  # Gemini flash models
  - model_name: gemini-3-flash-preview
    litellm_params:
      model: gemini/gemini-3-flash-preview
  - model_name: gemini-3.1-flash-lite-preview
    litellm_params:
      model: gemini/gemini-3.1-flash-lite-preview
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
  - model_name: gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite

  # Gemini image models
  - model_name: gemini-3-pro-image-preview
    litellm_params:
      model: gemini/gemini-3-pro-image-preview
  - model_name: gemini-3.1-flash-image-preview
    litellm_params:
      model: gemini/gemini-3.1-flash-image-preview
  - model_name: gemini-2.5-flash-image
    litellm_params:
      model: gemini/gemini-2.5-flash-image

litellm_settings:
  force_stream: true
  num_retries: 0
  callbacks:
    - langfuse
    - ccproxy.handler
  success_callback:
    - langfuse

router_settings:
  enable_pre_call_checks: false
  retry_after: 0
  allowed_fails: 1000
  cooldown_time: 0

general_settings:
  disable_spend_logs: true
  forward_client_headers_to_llm_api: true
  disable_master_key_return: true
  max_parallel_requests: 1000000
  global_max_parallel_requests: 1000000
